services:
  redis-db:
    extends:
      file: ./services/redis.yml
      service: redis-db
    restart: always

  db-init:
    extends:
      file: ./services/db.yml
      service: db-init
    restart: always

  db:
    depends_on:
      db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/db.yml
      service: db
    restart: always

  backend:
    depends_on:
      - db
      - redis-db
    extends:
      file: ./services/backend.yml
      service: backend
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        RELEASE_VERSION: 6.10.1
    links:
      - db:database
    environment:
      ETHEREUM_JSONRPC_HTTP_URL: https://rpc.selendra.org
      ETHEREUM_JSONRPC_TRACE_URL: https://rpc.selendra.org
      ETHEREUM_JSONRPC_WS_URL: wss://rpc.selendra.org
      CHAIN_ID: '1961'
      TRACE_FIRST_BLOCK: '0'
      TRACE_LAST_BLOCK: '0'
      DISABLE_INTERNAL_TRANSACTIONS_FETCHER: 'true'
    restart: always

  nft_media_handler:
    depends_on:
      - backend
    extends:
      file: ./services/nft_media_handler.yml
      service: nft_media_handler
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        RELEASE_VERSION: 6.10.1
    restart: always

  visualizer:
    extends:
      file: ./services/visualizer.yml
      service: visualizer
    restart: always

  sig-provider:
    extends:
      file: ./services/sig-provider.yml
      service: sig-provider
    restart: always

  frontend:
    depends_on:
      - backend
    extends:
      file: ./services/frontend.yml
      service: frontend
    restart: always

  stats-db-init:
    extends:
      file: ./services/stats.yml
      service: stats-db-init
    restart: always

  stats-db:
    depends_on:
      stats-db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/stats.yml
      service: stats-db
    restart: always

  stats:
    depends_on:
      - stats-db
      - backend
    extends:
      file: ./services/stats.yml
      service: stats
    restart: always

  user-ops-indexer:
    depends_on:
      - db
      - backend
    extends:
      file: ./services/user-ops-indexer.yml
      service: user-ops-indexer
    restart: always

  proxy:
    depends_on:
      - backend
      - frontend
      - stats
    extends:
      file: ./services/nginx.yml
      service: proxy
    restart: always
